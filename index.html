<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI 分享计划 · 调研分享</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    /* 墨水深色体系 */
    --ink-deep: #060d1a;
    --ink: #0a1628;
    --ink-soft: #121e35;
    --ink-tint: #1a2842;
    --line: rgba(201,169,110,.18);
    --line-soft: rgba(255,255,255,.06);

    /* 暖金强调色 */
    --accent: #c9a96e;
    --accent-soft: #d4b97f;
    --accent-deep: #b89656;
    --accent-glow: rgba(201,169,110,.15);

    /* 靛蓝强调色（话题分享） */
    --indigo: #6b8cff;
    --indigo-rgb: 107,140,255;
    --indigo-glow: rgba(107,140,255,.12);

    /* 文字层级 */
    --paper: #f5f3ef;
    --paper-soft: #d4cfc5;
    --paper-muted: #9a958a;
    --paper-faint: #6b6760;

    /* 字体 */
    --serif-zh: "Noto Serif SC", "Source Han Serif SC", Georgia, serif;
    --serif-en: "Playfair Display", Georgia, serif;
    --sans-zh: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;

    /* 间距系统 (4px基数) */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-6: 24px;
    --space-8: 32px;
    --space-12: 48px;
    --space-16: 64px;
    --space-20: 80px;

    /* 动效曲线 */
    --ease-out: cubic-bezier(.16,1,.3,1);
    --ease-out-soft: cubic-bezier(.25,1,.5,1);
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html{scroll-behavior:smooth}

  body{
    font-family: var(--sans-zh);
    background: var(--ink-deep);
    color: var(--paper);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* 背景氛围光 */
  body::before{
    content:"";
    position: fixed;
    top: -20%;
    right: -10%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }
  body::after{
    content:"";
    position: fixed;
    bottom: -30%;
    left: -15%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, var(--indigo-glow) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  /* 纸张纹理叠加 */
  .texture{
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: .03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .wrap{
    max-width: 1000px;
    margin: 0 auto;
    padding: var(--space-20) var(--space-6) var(--space-16);
    position: relative;
    z-index: 2;
  }

  /* ========== Header ========== */
  header{
    text-align: center;
    margin-bottom: var(--space-20);
    animation: fadeUp .9s var(--ease-out) both;
  }

  .kicker{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: .32em;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: var(--space-6);
  }
  .kicker::before,
  .kicker::after{
    content: "";
    width: 28px;
    height: 1px;
    background: var(--accent);
    opacity: .5;
  }

  h1{
    font-family: var(--serif-zh);
    font-size: clamp(36px, 5.2vw, 56px);
    font-weight: 700;
    letter-spacing: -.01em;
    line-height: 1.1;
    margin-bottom: var(--space-4);
    color: var(--paper);
  }
  h1 .en{
    font-family: var(--serif-en);
    font-style: italic;
    font-weight: 500;
    color: var(--accent);
    font-size: .72em;
    vertical-align: middle;
    margin-left: .4em;
  }

  .sub{
    color: var(--paper-muted);
    font-size: 15px;
    line-height: 1.7;
    max-width: 520px;
    margin: 0 auto;
    font-weight: 300;
  }
  .sub strong{
    color: var(--paper-soft);
    font-weight: 500;
  }

  /* ========== Latest 最新分享 ========== */
  .latest{
    display: block;
    text-decoration: none;
    color: inherit;
    background: linear-gradient(145deg, var(--ink-soft) 0%, var(--ink) 100%);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 44px 48px;
    margin-bottom: var(--space-16);
    position: relative;
    overflow: hidden;
    transition: transform .35s var(--ease-out),
                border-color .35s var(--ease-out),
                box-shadow .35s var(--ease-out);
    animation: fadeUp 1s .15s var(--ease-out) both;
  }
  .latest::before{
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: .6;
  }
  .latest::after{
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 240px;
    height: 240px;
    background: radial-gradient(circle at top right, var(--accent-glow), transparent 70%);
    pointer-events: none;
    transition: opacity .4s var(--ease-out);
    opacity: .6;
  }
  .latest:hover{
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 30px 60px -25px rgba(0,0,0,.6),
                0 0 0 1px var(--accent-glow);
  }
  .latest:hover::after{
    opacity: 1;
  }

  .latest .tag{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .3em;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .latest .tag::before{
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  .latest h2{
    font-family: var(--serif-zh);
    font-size: clamp(22px, 2.6vw, 30px);
    font-weight: 600;
    margin: var(--space-3) 0 var(--space-2);
    letter-spacing: -.005em;
    line-height: 1.35;
    color: var(--paper);
    text-wrap: balance;
  }

  .latest .meta{
    color: var(--paper-muted);
    font-size: 14px;
    font-family: var(--mono);
    letter-spacing: .05em;
    font-weight: 400;
  }

  .latest .go{
    position: absolute;
    right: 48px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: .12em;
    opacity: .9;
    transition: gap .3s var(--ease-out), opacity .3s var(--ease-out);
  }
  .latest .go .arrow{
    transition: transform .3s var(--ease-out);
    font-size: 15px;
  }
  .latest:hover .go{
    opacity: 1;
    gap: 14px;
  }
  .latest:hover .go .arrow{
    transform: translateX(3px);
  }

  /* ========== Section Title ========== */
  .sec-title{
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: .32em;
    color: var(--paper-faint);
    margin: 0 4px var(--space-6);
    text-transform: uppercase;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: fadeUp .8s .3s var(--ease-out) both;
  }
  .sec-title::after{
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--line-soft), transparent);
  }

  /* ========== Archive 双列布局 ========== */
  .archive-wrap{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    animation: fadeUp .9s .4s var(--ease-out) both;
  }
  .archive-col{
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .archive-col h3{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--paper-muted);
    font-weight: 500;
    padding: 0 2px 12px;
    border-bottom: 1px solid var(--line-soft);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .archive-col h3::before{
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }
  .archive-col.topic h3::before{
    background: var(--indigo);
  }

  .archive-col.topic .item::before{
    background: linear-gradient(90deg, var(--indigo), transparent);
  }
  .archive-col.topic .item:hover{
    border-color: var(--indigo);
  }
  .archive-col.topic .item .d{
    color: var(--indigo);
  }
  .archive-col.topic .item:hover .arrow{
    color: var(--indigo);
  }

  @media (max-width: 720px){
    .archive-wrap{ grid-template-columns: 1fr; gap: 24px; }
  }

  /* ========== 归档卡片 ========== */
  .item{
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    background: var(--ink-soft);
    border: 1px solid var(--line-soft);
    border-radius: 16px;
    padding: 24px 24px 20px;
    transition: transform .28s var(--ease-out),
                border-color .28s var(--ease-out),
                background .28s var(--ease-out);
    position: relative;
    overflow: hidden;
    min-height: 140px;
    flex: 1;
  }
  .item::before{
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    opacity: 0;
    transition: opacity .3s var(--ease-out);
  }
  .item:hover{
    border-color: var(--accent);
    transform: translateY(-3px);
    background: var(--ink-tint);
  }
  .item:hover::before{
    opacity: 1;
  }

  .item .d{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .12em;
    color: var(--accent);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    order: 1;
  }
  .item .d .star{
    font-size: 10px;
  }

  .item .t{
    font-family: var(--serif-zh);
    font-size: 17px;
    font-weight: 500;
    line-height: 1.55;
    color: var(--paper-soft);
    transition: color .28s var(--ease-out);
    text-wrap: balance;
    order: 2;
    flex: 1;
    display: flex;
    align-items: center;
    margin: 12px 0;
  }
  .item:hover .t{
    color: var(--paper);
  }

  .item .arrow{
    align-self: flex-end;
    color: var(--paper-faint);
    font-size: 14px;
    transition: transform .28s var(--ease-out), color .28s var(--ease-out);
    order: 3;
  }
  .item:hover .arrow{
    color: var(--accent);
    transform: translate(3px, -3px);
  }

  /* ========== Fallback ========== */
  .fallback{
    display: none;
    color: var(--paper-muted);
    font-size: 13px;
    margin-top: var(--space-6);
    line-height: 1.7;
    text-align: center;
  }
  .fallback code{
    font-family: var(--mono);
    background: var(--ink-soft);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--accent-soft);
  }

  /* ========== Footer ========== */
  footer{
    text-align: center;
    color: var(--paper-faint);
    font-size: 12px;
    margin-top: var(--space-20);
    line-height: 1.8;
    font-family: var(--mono);
    letter-spacing: .06em;
    animation: fadeUp .9s .55s var(--ease-out) both;
  }
  footer code{
    font-family: var(--mono);
    color: var(--paper-muted);
    background: var(--ink-soft);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
  }

  /* ========== Animations ========== */
  @keyframes fadeUp{
    from{ opacity: 0; transform: translateY(18px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse{
    0%, 100%{ opacity: 1; }
    50%{ opacity: .4; }
  }

  /* ========== Responsive ========== */
  @media (max-width: 720px){
    .wrap{ padding: var(--space-16) var(--space-4) var(--space-12); max-width: 100%; }
    header{ margin-bottom: var(--space-12); }
    .latest{
      padding: 28px 24px;
      margin-bottom: var(--space-12);
    }
    .latest .go{
      position: static;
      transform: none;
      margin-top: 18px;
      justify-content: flex-start;
    }
    h1{ font-size: 32px; }
    .item{ min-height: auto; padding: 20px; }
    .item .t{ font-size: 15px; }
  }

  /* ========== Accessibility ========== */
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .01ms !important;
    }
  }

  :focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 3px;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div class="texture"></div>
<div class="wrap">
  <header>
    <span class="kicker">Research &amp; Share</span>
    <h1>调研分享<span class="en">Hub</span></h1>
    <p class="sub">每周 AI 碰撞 → 深度调研 → 分享汇总<br/><strong>从碰撞中生长，让思考可见</strong></p>
  </header>

  <a class="latest" id="latest" href="#" style="display:none">
    <span class="tag">最新一期</span>
    <h2 id="latest-title">—</h2>
    <div class="meta" id="latest-meta">—</div>
    <span class="go">进入分享 <span class="arrow">→</span></span>
  </a>

  <p class="sec-title">历史归档 · Archive</p>
  <div class="archive-wrap" id="archive-wrap">
    <div class="archive-col research">
      <h3>调研分享 · Research</h3>
      <div id="archive-research"></div>
    </div>
    <div class="archive-col topic">
      <h3>话题分享 · Topic</h3>
      <div id="archive-topic"></div>
    </div>
  </div>
  <p class="fallback" id="fallback">无法自动加载列表，请直接访问当期文件夹（如 <code>2026.7.11-调研分享/ppt/</code>）。</p>

  <footer>
    由 AI 分享计划驱动 · 每次新一期自动更新<br/>
    <code>weeks.json</code> 维护全部期次
  </footer>
</div>

<script>
  // 兜底：即使 fetch 失败（如本地 file:// 打开）也能看到全部期次
  var FALLBACK = [{
    folder:"2026.7.11-话题分享",
    date:"2026-07-17",
    title:"第 1 期 AI 话题分享 · 数字分身确权 & 企微大圆",
    ppt:"2026.7.11-话题分享/ppt/"
  },{
    folder:"2026.7.11-调研分享",
    date:"2026-07-11",
    title:"第 1 期 AI 调研分享 · AI×IP 的四个关键判断",
    ppt:"2026.7.11-调研分享/ppt/"
  }];

  function formatDate(d){
    return d.replace(/-/g, '.');
  }

  function render(list){
    list.sort(function(a,b){ return a.date < b.date ? 1 : -1; }); // 日期倒序，最新在前
    var latest = list[0];
    var el = document.getElementById('latest');
    el.href = latest.ppt;
    document.getElementById('latest-title').textContent = latest.title;
    document.getElementById('latest-meta').textContent = '分享日期 · ' + formatDate(latest.date);
    el.style.display = 'block';

    // 按类型分类
    var research = list.filter(function(w){ return w.folder.indexOf('调研分享') > -1; });
    var topic = list.filter(function(w){ return w.folder.indexOf('话题分享') > -1; });

    function renderItems(container, items, isTopic){
      container.innerHTML = '';
      items.forEach(function(w, i){
        var a = document.createElement('a');
        a.className = 'item';
        a.href = w.ppt;
        a.innerHTML = '<div class="d">' + (i===0 ? '<span class="star">★</span> ' : '') + formatDate(w.date) + '</div>'
                    + '<div class="t">' + w.title + '</div>'
                    + '<span class="arrow">↗</span>';
        container.appendChild(a);
      });
    }

    renderItems(document.getElementById('archive-research'), research, false);
    renderItems(document.getElementById('archive-topic'), topic, true);
  }

  fetch('./weeks.json', {cache:'no-store'})
    .then(function(r){ return r.json(); })
    .then(render)
    .catch(function(){
      document.getElementById('fallback').style.display = 'block';
      render(FALLBACK);
    });
</script>
</body>
</html>
